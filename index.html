<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スマホ傾きボールゲーム</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #222;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #gameCanvas {
            background-color: #eed9b3;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #startMenu {
            position: absolute;
            text-align: center;
            color: white;
            z-index: 10;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px #initial;
        }
        button:active {
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div id="startMenu">
        <h2>ジャイロ ボールゲーム</h2>
        <p>スマホを傾けてボールをゴールに導こう！</p>
        <button id="startButton">ゲーム開始（センサーを許可）</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startMenu = document.getElementById('startMenu');
        const startButton = document.getElementById('startButton');

        // 画面サイズに合わせてキャンバスサイズを設定
        const width = Math.min(window.innerWidth, 500);
        const height = Math.min(window.innerHeight, 700);
        canvas.width = width;
        canvas.height = height;

        // ボールの初期ステータス
        const ball = {
            x: width / 2,
            y: height - 100,
            radius: 15,
            vx: 0,
            vy: 0,
            speedMultiplier: 0.15 // 傾きに対する感度
        };

        // ゴールの初期ステータス
        const goal = {
            x: width / 2,
            y: 80,
            radius: 25
        };

        // 傾きデータの保持
        let tiltX = 0;
        let tiltY = 0;
        let isPlaying = false;

        // 開始ボタンのクリックイベント
        startButton.addEventListener('click', () => {
            requestDeviceOrientationPermission();
        });

        // iOS用の権限要求とセンサーの開始
        function requestDeviceOrientationPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+ の処理
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            initGame();
                        } else {
                            alert('センサーの利用が拒否されました。設定を確認してください。');
                        }
                    })
                    .catch(console.error);
            } else {
                // Android や 古いiOS、PC等の処理
                initGame();
            }
        }

        function initGame() {
            startMenu.style.display = 'none';
            isPlaying = true;
            
            // 傾きセンサーのイベントリスナーを登録
            window.addEventListener('deviceorientation', handleOrientation);
            
            // ゲームループ開始
            requestAnimationFrame(update);
        }

        // センサーデータの処理
        function handleOrientation(event) {
            // gamma: 左右の傾き（-90度 〜 90度）
            // beta: 前後の傾き（-180度 〜 180度）
            tiltX = event.gamma || 0;
            tiltY = event.beta || 0;
        }

        // メインループ（更新と描画）
        function update() {
            if (!isPlaying) return;

            // 1. ボールの速度を傾きに応じて変化（物理演算の真似事）
            ball.vx += tiltX * ball.speedMultiplier;
            ball.vy += (tiltY - 45) * ball.speedMultiplier; // 45度くらいスマホを寝かせて持つ状態を基準にする

            // 摩擦（スピードが出過ぎないように減速させる）
            ball.vx *= 0.95;
            ball.vy *= 0.95;

            // 位置の更新
            ball.x += ball.vx;
            ball.y += ball.vy;

            // 2. 壁との衝突判定
            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx *= -0.5; // 跳ね返り
            }
            if (ball.x + ball.radius > width) {
                ball.x = width - ball.radius;
                ball.vx *= -0.5;
            }
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy *= -0.5;
            }
            if (ball.y + ball.radius > height) {
                ball.y = height - ball.radius;
                ball.vy *= -0.5;
            }

            // 3. ゴール判定（2点間の距離の計算）
            const dx = ball.x - goal.x;
            const dy = ball.y - goal.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < ball.radius + goal.radius) {
                alert('ゴール！クリアおめでとう！');
                resetGame();
                return;
            }

            // 4. 描画処理
            ctx.clearRect(0, 0, width, height);

            // ゴールの描画（緑）
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#2ecc71';
            ctx.fill();
            ctx.closePath();

            // ゴールインナーマーク
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = '#27ae60';
            ctx.fill();
            ctx.closePath();

            // ボールの描画（赤）
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            ctx.closePath();

            // 次のフレームを要求
            requestAnimationFrame(update);
        }

        // ゲームのリセット
        function resetGame() {
            ball.x = width / 2;
            ball.y = height - 100;
            ball.vx = 0;
            ball.vy = 0;
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
